<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblical Empowerment Program (BEP)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        header { text-align: center; }
        h1 { color: #333; }
        form { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; }
        button { background: #2C73D2; color: white; border: none; cursor: pointer; }
        button:hover { background: #1a57a5; }
    </style>
</head>
<body>

<header>
    <h1>Biblical Empowerment Program</h1>
    <p>Building the Church of Christ</p>
</header>

<section>
    <h2 style="text-align:center;">Registration Form</h2>
    <form id="bepForm">
        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Phone</label>
        <input type="tel" name="phone" required>

        <button type="submit">Register</button>
    </form>
</section>

</body>
</html>
